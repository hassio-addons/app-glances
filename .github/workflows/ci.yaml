---
name: CI

# yamllint disable-line rule:truthy
on:
  push:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
  workflow_dispatch:

jobs:
  dockerfile-guard:
    name: Dockerfile Guard
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Reject exact apk package pins
        run: |
          bad_lines="$(awk '
            /apk add --no-cache/ {in_apk=1}
            in_apk && /^[[:space:]]+[a-z0-9][a-z0-9-]*=.*/ {print}
            in_apk && /&&/ {in_apk=0}
          ' glances/Dockerfile)"

          if [ -n "${bad_lines}" ]; then
            echo "Exact apk package pins make the add-on build brittle against base image refreshes."
            echo "${bad_lines}"
            exit 1
          fi

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38 # 2.0.0
        with:
          scandir: glances/rootfs

  workflows:
    uses: hassio-addons/workflows/.github/workflows/addon-ci.yaml@3846ae0fd09acec8ac1ac308ceacd052b9d01bec
